name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Anuluj wcześniejsze uruchomienia dla tego samego brancha/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # `npm run build` = vue-tsc (typecheck) + vite build.
      # Błąd typów zatrzymuje pipeline — to celowa bramka jakości.
      - name: Typecheck & build
        run: npm run build

      - name: Upload production build
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
