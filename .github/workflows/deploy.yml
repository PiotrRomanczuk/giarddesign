name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# Uprawnienia wymagane do publikacji na GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Jedno wdrożenie na raz; nie anuluj trwającego (aby nie zostawić Pages w połowie)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # `npm run build` = vue-tsc (typecheck) + vite build → dist/
      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
